<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <title>LVGL Previewer</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0d1117;
      color: #c9d1d9;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', monospace;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    #header {
      height: 56px;
      background: #161b22;
      border-bottom: 1px solid #30363d;
      display: flex;
      align-items: center;
      padding: 0 24px;
      gap: 16px;
      flex-shrink: 0;
    }
    #header .logo {
      font-size: 16px;
      font-weight: 700;
      color: #58a6ff;
      letter-spacing: 0.5px;
    }
    #header .spacer { flex: 1; }

    .btn {
      font-size: 13px;
      padding: 8px 16px;
      border-radius: 6px;
      border: 1px solid #30363d;
      background: #21262d;
      color: #c9d1d9;
      cursor: pointer;
      transition: all 0.15s;
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }
    .btn:hover { background: #30363d; border-color: #8b949e; }
    .btn.primary { background: #238636; border-color: #238636; color: #fff; }
    .btn.primary:hover { background: #2ea043; }
    .btn.small { padding: 6px 12px; font-size: 12px; }

    #main {
      flex: 1;
      display: flex;
      overflow: hidden;
    }

    #sidebar {
      width: 300px;
      background: #161b22;
      border-right: 1px solid #30363d;
      display: flex;
      flex-direction: column;
      flex-shrink: 0;
      transition: width 0.2s ease;
    }
    #sidebar.collapsed {
      width: 48px;
    }
    #sidebar.collapsed #sidebar-content,
    #sidebar.collapsed #add-project-form {
      display: none;
    }
    #sidebar.collapsed #sidebar-header h2 {
      display: none;
    }
    #sidebar-header {
      padding: 16px;
      border-bottom: 1px solid #30363d;
      display: flex;
      align-items: center;
      justify-content: space-between;
      cursor: pointer;
      transition: background 0.15s;
    }
    #sidebar-header:hover {
      background: #1c2128;
    }
    #sidebar-header h2 {
      font-size: 12px;
      font-weight: 600;
      color: #8b949e;
      text-transform: uppercase;
      letter-spacing: 0.8px;
    }
    #sidebar-toggle {
      font-weight: bold;
      min-width: 24px;
    }

    #add-project-form {
      padding: 16px;
      border-bottom: 1px solid #30363d;
    }
    #add-project-form .form-group {
      margin-bottom: 12px;
    }
    #add-project-form label {
      display: block;
      font-size: 11px;
      color: #8b949e;
      margin-bottom: 4px;
    }
    #add-project-form input {
      width: 100%;
      padding: 8px 10px;
      font-size: 12px;
      background: #0d1117;
      border: 1px solid #30363d;
      border-radius: 4px;
      color: #c9d1d9;
      font-family: inherit;
    }
    #add-project-form input:focus {
      outline: none;
      border-color: #58a6ff;
    }
    #add-project-form .actions {
      margin-top: 16px;
    }
    #add-project-form .actions .btn { width: 100%; justify-content: center; }

    #project-list {
      flex: 1;
      overflow-y: scroll;
      padding: 8px;
    }
    #project-list::-webkit-scrollbar {
      width: 8px;
    }
    #project-list::-webkit-scrollbar-track {
      background: transparent;
    }
    #project-list::-webkit-scrollbar-thumb {
      background: #484f58;
      border-radius: 4px;
    }
    #project-list::-webkit-scrollbar-thumb:hover {
      background: #6e7681;
    }
    .project-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 12px;
      border-radius: 6px;
      cursor: pointer;
      transition: background 0.15s;
      border: 1px solid transparent;
      margin-bottom: 4px;
    }
    .project-item:hover { background: #1c2128; }
    .project-item.active {
      background: #1c2128;
      border-color: #58a6ff;
    }
    .project-item .icon {
      width: 36px;
      height: 36px;
      background: #21262d;
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      flex-shrink: 0;
    }
    .project-item.active .icon { background: #238636; }
    .project-item .info { flex: 1; min-width: 0; }
    .project-item .name {
      font-size: 13px;
      font-weight: 500;
      color: #c9d1d9;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .project-item .path {
      font-size: 10px;
      color: #8b949e;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .project-item .remove {
      opacity: 0;
      padding: 4px 8px;
      font-size: 11px;
      color: #8b949e;
      background: none;
      border: none;
      cursor: pointer;
      border-radius: 4px;
    }
    .project-item:hover .remove { opacity: 1; }
    .project-item .remove:hover { background: #da3633; color: #fff; }

    .no-projects {
      padding: 40px 20px;
      text-align: center;
      color: #8b949e;
      font-size: 12px;
    }

    #preview-container {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      background: #0d1117;
    }
    #preview-frame {
      flex: 1;
      border: none;
      width: 100%;
      height: 100%;
    }

    #empty-state {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 24px;
      color: #8b949e;
      padding: 40px;
    }
    #empty-state .icon { font-size: 64px; opacity: 0.3; }
    #empty-state h2 { font-size: 18px; font-weight: 500; color: #c9d1d9; }
    #empty-state p { font-size: 13px; max-width: 400px; text-align: center; line-height: 1.6; }
    #empty-state .hint { font-size: 11px; color: #6e7681; margin-top: 8px; }
  </style>
</head>
<body>

  <div id="header">
    <span class="logo">◆ LVGL Previewer</span>
    <span class="spacer"></span>
  </div>

  <div id="main">
    <div id="sidebar">
      <div id="sidebar-header" onclick="toggleSidebar()">
        <h2>Projects</h2>
        <button class="btn small toggle-btn" id="sidebar-toggle" onclick="toggleSidebar(); event.stopPropagation();">◀</button>
      </div>
      <div id="sidebar-content">

      <div id="add-project-form">
        <div class="form-group">
          <label>Project Name</label>
          <input type="text" id="input-name" placeholder="My Project">
        </div>
        <div class="form-group">
          <label>Project Path (absolute path)</label>
          <input type="text" id="input-path" placeholder="/path/to/lvgl/project">
        </div>
        <div class="actions">
          <button class="btn primary" onclick="addFromInput()">Open Project</button>
        </div>
      </div>

      <div id="project-list"></div>
      </div>
    </div>

    <div id="preview-container">
      <div id="empty-state">
        <div class="icon">📁</div>
        <h2>No project selected</h2>
        <p>Enter project name and path, then click "Open Project" to load.</p>
        <div class="hint">The folder must contain globals.xml<br>or use URL: ?project=/path/to/project</div>
      </div>
      <iframe id="preview-frame" style="display: none;"></iframe>
    </div>
  </div>

  <script>
    const BUILTIN_PROJECTS = [
  { id: 'builtin_tutorial_1_hello_world', name: 'Tutorial: 1 Hello World', path: '/home/chenjinbin/lvgl-previewer/tutorials/1_hello_world' },
  { id: 'builtin_tutorial_2_new_component', name: 'Tutorial: 2 New Component', path: '/home/chenjinbin/lvgl-previewer/tutorials/2_new_component' },
  { id: 'builtin_tutorial_3_assets', name: 'Tutorial: 3 Assets', path: '/home/chenjinbin/lvgl-previewer/tutorials/3_assets' },
  { id: 'builtin_tutorial_4_screens', name: 'Tutorial: 4 Screens', path: '/home/chenjinbin/lvgl-previewer/tutorials/4_screens' },
  { id: 'builtin_tutorial_5_layouts', name: 'Tutorial: 5 Layouts', path: '/home/chenjinbin/lvgl-previewer/tutorials/5_layouts' },
  { id: 'builtin_tutorial_6_data_binding', name: 'Tutorial: 6 Data Binding', path: '/home/chenjinbin/lvgl-previewer/tutorials/6_data_binding' },
  { id: 'builtin_tutorial_7_translations', name: 'Tutorial: 7 Translations', path: '/home/chenjinbin/lvgl-previewer/tutorials/7_translations' },
  { id: 'builtin_tutorial_8_animations', name: 'Tutorial: 8 Animations', path: '/home/chenjinbin/lvgl-previewer/tutorials/8_animations' },
  { id: 'builtin_examples', name: 'Examples', path: '/home/chenjinbin/lvgl-previewer/examples' },
];

    let userProjects = JSON.parse(localStorage.getItem('lvgl-projects') || '[]');
    let projects = [...BUILTIN_PROJECTS, ...userProjects];
    let currentProjectId = localStorage.getItem('lvgl-current-project') || null;

    const API_BASE = '';

    // Parse URL parameters on load
    const urlParams = new URLSearchParams(window.location.search);
    const directProjectPath = urlParams.get('project');
    const directProjectName = urlParams.get('name');

    document.addEventListener('DOMContentLoaded', () => {
      renderProjectList();

      // If URL has ?project=xxx, load it directly
      if (directProjectPath) {
        const name = directProjectName || directProjectPath.split('/').pop() || 'Project';
        loadDirectProject(name, directProjectPath);
        return;
      }

      if (currentProjectId) {
        loadProject(currentProjectId);
      }
    });

    async function loadDirectProject(name, path) {
      // Check if already in list
      const existing = projects.find(p => p.path === path);
      if (existing) {
        loadProject(existing.id);
        return;
      }

      // Validate first
      const isValid = await validateProject(path);
      if (!isValid) {
        alert(`Invalid project: ${path}\n\nFolder must contain globals.xml`);
        return;
      }

      // Add and load
      const id = Date.now().toString();
      const newProject = { id, name, path };
      userProjects.push(newProject);
      projects = [...BUILTIN_PROJECTS, ...userProjects];
      currentProjectId = id;
      saveProjects();
      renderProjectList();
      loadProject(id);
    }

    function renderProjectList() {
      const list = document.getElementById('project-list');

      // Separate built-in and user projects
      const builtinList = projects.filter(p => p.id.startsWith('builtin_'));
      const userList = projects.filter(p => !p.id.startsWith('builtin_'));

      let html = '';

      // Built-in projects section
      if (builtinList.length > 0) {
        html += '<div style="padding: 8px 12px; font-size: 10px; color: #8b949e; text-transform: uppercase; letter-spacing: 0.5px;">Built-in</div>';
        html += builtinList.map(p => `
          <div class="project-item ${p.id === currentProjectId ? 'active' : ''}" onclick="loadProject('${p.id}')">
            <div class="icon">&#128218;</div>
            <div class="info">
              <div class="name">${escapeHtml(p.name)}</div>
              <div class="path">${escapeHtml(p.path)}</div>
            </div>
          </div>
        `).join('');
      }

      // User projects section
      if (userList.length > 0) {
        html += '<div style="padding: 8px 12px; font-size: 10px; color: #8b949e; text-transform: uppercase; letter-spacing: 0.5px; margin-top: 8px;">My Projects</div>';
        html += userList.map(p => `
          <div class="project-item ${p.id === currentProjectId ? 'active' : ''}" onclick="loadProject('${p.id}')">
            <div class="icon">&#128208;</div>
            <div class="info">
              <div class="name">${escapeHtml(p.name)}</div>
              <div class="path">${escapeHtml(p.path)}</div>
            </div>
            <button class="remove" onclick="removeProject(event, '${p.id}')">&#10005;</button>
          </div>
        `).join('');
      }

      if (html === '') {
        html = '<div class="no-projects">No projects yet.<br>Add a project below.</div>';
      }

      list.innerHTML = html;
    }

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    async function addFromInput() {
      const name = document.getElementById('input-name').value.trim();
      const path = document.getElementById('input-path').value.trim();

      if (!name || !path) {
        alert('Please enter both name and path');
        return;
      }

      if (!path.startsWith('/')) {
        alert('Path must be absolute (start with /)');
        return;
      }

      await addProject(name, path);
    }

    async function validateProject(path) {
      try {
        const resp = await fetch(`${API_BASE}/api/file?project=${encodeURIComponent(path)}&path=globals.xml`, { method: 'HEAD' });
        return resp.ok;
      } catch(e) {
        return false;
      }
    }

    async function addProject(name, path) {
      const existing = projects.find(p => p.path === path);
      if (existing) {
        currentProjectId = existing.id;
        saveProjects();
        renderProjectList();
        loadProject(currentProjectId);
        return;
      }

      const isValid = await validateProject(path);
      if (!isValid) {
        alert(`Invalid LVGL project: ${path}\n\nFolder must contain globals.xml`);
        return;
      }

      const id = Date.now().toString();
      const newProject = { id, name, path };
      userProjects.push(newProject);
      projects = [...BUILTIN_PROJECTS, ...userProjects];
      currentProjectId = id;
      saveProjects();
      renderProjectList();
      loadProject(currentProjectId);
    }

    function removeProject(e, id) {
      e.stopPropagation();
      // Check if it's a built-in project
      const isBuiltin = BUILTIN_PROJECTS.some(p => p.id === id);
      if (isBuiltin) {
        alert('Built-in projects cannot be removed');
        return;
      }
      userProjects = userProjects.filter(p => p.id !== id);
      projects = [...BUILTIN_PROJECTS, ...userProjects];
      if (currentProjectId === id) {
        currentProjectId = null;
        showEmptyState();
      }
      saveProjects();
      renderProjectList();
    }

    let sidebarCollapsed = false;

    function toggleSidebar() {
      sidebarCollapsed = !sidebarCollapsed;
      const sidebar = document.getElementById('sidebar');
      const toggleBtn = document.getElementById('sidebar-toggle');
      if (sidebarCollapsed) {
        sidebar.classList.add('collapsed');
        toggleBtn.textContent = '▶';
      } else {
        sidebar.classList.remove('collapsed');
        toggleBtn.textContent = '◀';
      }
    }

    function saveProjects() {
      localStorage.setItem('lvgl-projects', JSON.stringify(userProjects));
      localStorage.setItem('lvgl-current-project', currentProjectId || '');
    }

    function loadProject(id) {
      const project = projects.find(p => p.id === id);
      if (!project) return;

      currentProjectId = id;
      saveProjects();
      renderProjectList();

      document.getElementById('empty-state').style.display = 'none';
      const frame = document.getElementById('preview-frame');
      frame.style.display = 'block';

      const encodedPath = encodeURIComponent(project.path);
      frame.src = `/viewer.html?project=${encodedPath}`;
    }

    function showEmptyState() {
      document.getElementById('empty-state').style.display = 'flex';
      document.getElementById('preview-frame').style.display = 'none';
      document.getElementById('preview-frame').src = '';
    }
  </script>

</body>
</html>
